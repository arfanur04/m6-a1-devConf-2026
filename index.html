<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<!-- google font -->
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"

			rel="preconnect"

		/>

		/>

		<title>DevConf 2026</title>
		<link
